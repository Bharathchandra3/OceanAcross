version: '3.8'

services:
  api:
    image: praveenkumar257/conversation-evaluator:latest
    build: .
    container_name: conversation-evaluator-api
    ports:
      - "8000:8000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - DEBUG=false
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
      - ./output:/app/output
    command: uvicorn api_main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - evaluation-network

  ui:
    image: praveenkumar257/conversation-evaluator:latest
    build: .
    container_name: conversation-evaluator-ui
    ports:
      - "8501:8501"
    environment:
      - PYTHONUNBUFFERED=1
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    volumes:
      - ./data:/app/data
      - ./output:/app/output
    command: streamlit run ui_app.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - api
    networks:
      - evaluation-network

  ollama:
    image: ollama/ollama:latest
    container_name: ollama-service
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    networks:
      - evaluation-network
    # Note: To use LLaMA, run: docker exec ollama-service ollama pull llama2-7b

networks:
  evaluation-network:
    driver: bridge

volumes:
  ollama-data:
    driver: local
